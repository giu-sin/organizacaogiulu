<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Painel de Pautas 🔒</title>
<style>:root{color-scheme:light}body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f2f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.box{background:#fff;border:1px solid #ece8f1;border-radius:16px;padding:30px 28px;width:330px;box-shadow:0 8px 30px rgba(90,60,140,.10);text-align:center}
h1{font-size:19px;margin:0 0 4px;color:#241f2b}p{color:#6b6577;font-size:12.5px;margin:0 0 18px}
input{width:100%;padding:11px 12px;border:1px solid #ddd6e8;border-radius:10px;font-size:14px;margin-bottom:10px}
button{width:100%;padding:11px;border:0;border-radius:10px;background:#6a3fb5;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.err{color:#e0483b;font-size:12px;min-height:16px;margin-top:8px}</style></head>
<body><div class="box"><h1>📋 Painel de Pautas</h1><p>Conteúdo protegido. Digite a senha para abrir.</p>
<input id="pw" type="password" placeholder="senha" autofocus onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">Abrir painel</button><div class="err" id="err"></div></div>
<script>
const B64="__BLOB__";
async function go(){
  const pw=document.getElementById('pw').value; const err=document.getElementById('err');
  if(!pw){err.textContent='Digite a senha.';return;} err.textContent='abrindo…';
  try{
    const raw=Uint8Array.from(atob(B64),c=>c.charCodeAt(0));
    const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){ err.textContent='Senha incorreta.'; }
}
</script></body></html>
